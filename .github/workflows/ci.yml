name: CI

on:
  pull_request:
    branches: [main, master]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────
  # Lint & Quality Gates
  # ──────────────────────────────────────────────
  lint-and-quality:
    name: Lint & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'graalvm'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint
        run: cd frontend && npm ci && npm run lint && npm run format:check

      - name: Java quality gates
        run: ./mvnw validate -P no-checks -B && ./mvnw checkstyle:check pmd:check -B

  # ──────────────────────────────────────────────
  # Unit Tests
  # ──────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'graalvm'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Unit tests
        run: ./mvnw test -P no-checks -B

  # ──────────────────────────────────────────────
  # Integration Tests
  # ──────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'graalvm'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Integration tests
        run: ./mvnw verify -P no-checks -B

  # ──────────────────────────────────────────────
  # Build
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-quality, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'graalvm'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build JAR
        run: ./mvnw package -P no-checks,frontend -B -DskipTests

      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/azadi-*.jar
          retention-days: 7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validate only)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: jvm
          push: false
          tags: azadi:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
