services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - ${HOME}/.npm:/home/vscode/.npm
      - ${HOME}/.m2:/home/vscode/.m2
      - ${HOME}/.claude:/home/vscode/.claude
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
      - "3000:3000"
      - "4000:4000"
      - "8081:8081"
      - "9099:9099"
    command: sleep infinity
    user: vscode
